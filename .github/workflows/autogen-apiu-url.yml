# ======================================================================================
# DIRETRIZES DE NEGÓCIO E SEGURANÇA - AUTOMAÇÃO DE DOWNLOADS ISO
# ======================================================================================
# 1. OBJETIVO: Manter URLs e Hashes de distribuições Linux atualizados via GitHub Actions.
# 2. PERIODICIDADE: Execução automática dominical (00:01 UTC) ou disparo manual via UI.
# 3. IDEMPOTÊNCIA E BLINDAGEM:
#    - Persistência: O arquivo 'API_JSON/urls.json' nunca deve ser deletado ou zerado.
#    - Fallback: Se um mirror falhar, os dados preexistente no JSON DEVEM ser mantidos.
#    - Atomicidade: Gravações via JQ utilizam arquivos temporários para evitar corrupção.
# 4. RESILIÊNCIA DE REDE:
#    - Retries: Mínimo de 3 tentativas com Backoff Exponencial (espera crescente).
#    - Timeout: Limite estrito de 10s por requisição e 60s para o ciclo total de scraping.
# 5. ESTRUTURA DE DADOS:
#    - Padrão: {
#       "sistema": {
#         "url":"URL_FILE",
#          "hash": "URL_HASH_OU_STRING"
#          [,variação1: { "url": "URL_ISO", "hash": "URL_HASH_OU_STRING"}...]  (Opcionalmente)
#        }
#      }.
#    - Integridade: URLs devem obrigatoriamente iniciar com o protocolo HTTPS?.
# 6. GESTÃO DE REPOSITÓRIO:
#    - Commits: Apenas em caso de alteração real de conteúdo (Prevenção de No-Op Commits).
#    - Rastreabilidade: Logs detalhados em todas as etapas para auditoria de falhas.
# ======================================================================================

name: Update API URLs
on:
  schedule:
    - cron: '1 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Instalando Dependências
        run: sudo apt-get update && sudo apt-get install -y jq curl

      - name: Atualizar URL e Hash
        run: |
          # --- CONFIGURAÇÕES DE AMBIENTE ---
          DIR="API_JSON"
          FILE="$DIR/urls.json"
          LOG_PREFIX="[DEBUG-AUTOMATION]"
          MAX_RETRIES=3
          TOTAL_TIMEOUT=60
          START_TIME=$(date +%s)

          # 1. FUNÇÃO DE INFRAESTRUTURA
          ensure_infrastructure() {
            if [ ! -d "$DIR" ]; then
              echo "$LOG_PREFIX Diretório $DIR não existe. Criando recursivamente..."
              mkdir -p "$DIR" || { echo "ERRO FATAL: Impossível criar diretório."; exit 1; }
            fi

            if [ ! -f "$FILE" ] || [ ! -s "$FILE" ]; then
              echo "$LOG_PREFIX Arquivo JSON não encontrado ou vazio. Inicializando objeto."
              echo '{}' > "$FILE"
            fi
          }

          # 2. FUNÇÃO DE VERIFICAÇÃO DE TIMEOUT GLOBAL
          check_global_timeout() {
            local label=$1
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            if [ $ELAPSED -ge $TOTAL_TIMEOUT ]; then
              echo "$LOG_PREFIX [$label] TIMEOUT GLOBAL: ${TOTAL_TIMEOUT}s excedido." >&2
              return 1
            fi
            return 0
          }

          # 3. FUNÇÃO DE FETCH COM RETRY (SAÍDA LIMPA)
          smart_fetch() {
            local label=$1
            local cmd=$2
            local attempt=1
            local wait_time=2

            while [ $attempt -le $MAX_RETRIES ]; do
              check_global_timeout "$label" || return 1
              
              echo "$LOG_PREFIX [$label] Tentativa $attempt de $MAX_RETRIES..." >&2
              result=$(timeout 20s bash -c "$cmd" 2>/dev/null)

              if [ -n "$result" ] && [[ "$result" =~ ^https?:// ]]; then
                echo "$result"
                return 0
              fi

              echo "$LOG_PREFIX [$label] Falha. Aguardando ${wait_time}s..." >&2
              sleep $wait_time
              attempt=$((attempt + 1))
              wait_time=$((wait_time * 2))
            done

            echo "$LOG_PREFIX [$label] ERRO: Falha definitiva." >&2
            return 1
          }

          # 4. FUNÇÃO DE VALIDAÇÃO HTTPS
          # 4. FUNÇÃO DE NORMALIZAÇÃO DE URL (FORÇA HTTPS, TRATA FTP)
          normalize_url() {
            local url=$1
            local system=$2
            
            if [[ "$url" =~ ^ftp:// ]]; then
              echo "$LOG_PREFIX [$system] AVISO: URL FTP detectada. Convertendo para HTTPS."
              url=$(echo "$url" | sed 's|^ftp://|https://|')
            elif [[ "$url" =~ ^http:// ]]; then
              echo "$LOG_PREFIX [$system] AVISO: URL HTTP detectada. Forçando HTTPS."
              url=$(echo "$url" | sed 's|^http://|https://|')
            elif [[ ! "$url" =~ ^https:// ]]; then
              echo "$LOG_PREFIX [$system] AVISO: URL sem protocolo. Adicionando HTTPS."
              url="https://$url"
            fi
            
            echo "$url"
          }

          # 5. FUNÇÃO DE BACKUP ATÔMICO
          atomic_backup() {
            cp "$FILE" "${FILE}.backup"
          }

          # 6. FUNÇÃO DE RESTAURAÇÃO
          atomic_restore() {
            mv "${FILE}.backup" "$FILE"
            rm -f "${FILE}.tmp"
          }

          # 7. FUNÇÃO DE PERSISTÊNCIA JQ
          persist_json() {
            local system=$1
            local url=$2
            local hash=$3
            
            atomic_backup
            
            if jq --arg sys "$system" --arg url "$url" --arg hash "$hash" \
              '.[$sys] = {"url": $url, "hash": $hash}' "$FILE" > "${FILE}.tmp"; then
                mv "${FILE}.tmp" "$FILE"
                echo "$LOG_PREFIX [$system] SUCESSO: Dados persistidos."
                rm -f "${FILE}.backup"
                return 0
            else
                echo "$LOG_PREFIX [$system] ERRO: Falha no JQ. Mantendo dados anteriores."
                atomic_restore
                return 1
            fi
          }

          # 8. FUNÇÃO DE ATUALIZAÇÃO COMPLETA (NÃO INTERROMPE FLUXO)
          update_json_structure() {
            local system=$1
            local new_url=$2
            local new_hash=$3

            if [ -z "$new_url" ]; then
              echo "$LOG_PREFIX [$system] URL vazia. Mantendo dados existentes."
              return 0
            fi
            
            new_url=$(normalize_url "$new_url" "$system")
            
            echo "$LOG_PREFIX [$system] Validando dados..."
            persist_json "$system" "$new_url" "$new_hash"
            
            return 0
          }

          # 9. FUNÇÕES ESPECÍFICAS POR SOFTWARE
          fetch_linuxmint() {
            local system_key="linuxmint"
            echo "$LOG_PREFIX Extraindo dados: Linux Mint..."
            
            local base_url="https://mirrors.edge.kernel.org/linuxmint/stable/"
            local version=$(curl -sL --max-time 20 "$base_url" | grep -oP '[0-9.]+(?=/)' | sort -V | tail -n 1)
            
            if [ -z "$version" ]; then
              echo "$LOG_PREFIX [$system_key] Falha na detecção da versão. Mantendo dados anteriores."
              return 0
            fi
            
            local url="${base_url}${version}/linuxmint-${version}-cinnamon-64bit.iso"
            url=$(normalize_url "$url" "$system_key")
            local hash=$(echo "$url" | sed 's|linuxmint-.*.iso|sha256sum.txt|')
            
            update_json_structure "$system_key" "$url" "$hash"
            return 0
          }

          fetch_batocera() {
            local system_key="batocera"
            echo "$LOG_PREFIX Extraindo dados: Batocera..."
            
            local base_url="https://mirrors.o2switch.fr/batocera/x86_64/stable/last/"
            
            local arquivo=$(curl -sL --max-time 20 "$base_url" | grep -oP 'href="\Kbatocera-x86_64-[^"]+\.img\.gz' | head -1)
            
            if [ -z "$arquivo" ]; then
              echo "$LOG_PREFIX [$system_key] Falha na detecção do arquivo. Mantendo dados anteriores."
              return 0
            fi
            
            local url="${base_url}${arquivo}"
            url=$(normalize_url "$url" "$system_key")
            
            # Hash: mesmo diretório, mesmo nome do arquivo com .sha256
            local hash="${base_url}${arquivo}.sha256"
            hash=$(normalize_url "$hash" "$system_key")
            
            update_json_structure "$system_key" "$url" "$hash"
            return 0
          }

          # Função específica para LibreELEC com duas versões
          fetch_libreelec_dual() {
            local system_key="libreelec"
            echo "$LOG_PREFIX Extraindo dados dual: LibreELEC..."
            
            local page_url="https://libreelec.tv/downloads/generic/"
            
            local all_hrefs=$(curl -sL --max-time 20 -A "Mozilla/5.0" "$page_url" | grep -oP 'href="\K[^"]+\.img\.gz')
            
            if [ -z "$all_hrefs" ]; then
              echo "$LOG_PREFIX [$system_key] Falha na extração dos hrefs. Mantendo dados anteriores."
              return 0
            fi
            
            local url_main=$(echo "$all_hrefs" | grep "Generic.x86_64" | grep -v "legacy" | head -n 1)
            local url_legacy=$(echo "$all_hrefs" | grep "Generic-legacy" | head -n 1)
            
            if [ -z "$url_main" ] && [ -z "$url_legacy" ]; then
              echo "$LOG_PREFIX [$system_key] Nenhuma URL encontrada. Mantendo dados anteriores."
              return 0
            fi
            
            # Converte URLs relativas para absolutas se necessário
            if [[ "$url_main" =~ ^/ ]]; then
              url_main="https://libreelec.tv$url_main"
            fi
            if [[ "$url_legacy" =~ ^/ ]]; then
              url_legacy="https://libreelec.tv$url_legacy"
            fi
            
            url_main=$(normalize_url "$url_main" "$system_key")
            url_legacy=$(normalize_url "$url_legacy" "$system_key")
            
            local hash_main="${url_main}.sha256"
            local hash_legacy="${url_legacy}.sha256"
            
            atomic_backup
            
            if jq --arg sys "$system_key" \
                  --arg url_main "$url_main" \
                  --arg hash_main "$hash_main" \
                  --arg url_legacy "$url_legacy" \
                  --arg hash_legacy "$hash_legacy" \
              '.[$sys] = {
                "url": $url_main,
                "hash": $hash_main,
                "legacy": {
                  "url": $url_legacy,
                  "hash": $hash_legacy
                }
              }' "$FILE" > "${FILE}.tmp"; then
                mv "${FILE}.tmp" "$FILE"
                echo "$LOG_PREFIX [$system_key] SUCESSO: Dados dual persistidos."
                rm -f "${FILE}.backup"
            else
                echo "$LOG_PREFIX [$system_key] ERRO: Falha no JQ. Mantendo dados anteriores."
                atomic_restore
            fi
            
            return 0
          }

          # 10. FUNÇÃO LEGADA (MANTIDA PARA COMPATIBILIDADE)
          process_distro() {
            local name=$1
            local cmd=$2
            local hash_transform=$3
            local system_key=$(echo "$name" | tr '[:upper:]' '[:lower:]')
            
            echo "$LOG_PREFIX Extraindo dados: $name..."
            
            local url=""
            url=$(smart_fetch "${name}_URL" "$cmd") || {
              echo "$LOG_PREFIX [$system_key] Falha na obtenção da URL. Mantendo dados anteriores."
              return 0
            }
            
            if [ -n "$url" ]; then
              local hash=$(eval "$hash_transform")
              update_json_structure "$system_key" "$url" "$hash"
            fi
            
            return 0
          }

          # 9.1 FUNÇÃO PARA DISTROS COM DUAS VERSÕES (LIBREELEC)
          process_distro_dual() {
            local name=$1
            local cmd_main=$2
            local cmd_legacy=$3
            local hash_transform=$4
            local system_key=$(echo "$name" | tr '[:upper:]' '[:lower:]')
            
            echo "$LOG_PREFIX Extraindo dados dual: $name..."
            
            local url_main=""
            local url_legacy=""
            local hash_main=""
            local hash_legacy=""
            
            url_main=$(smart_fetch "${name}_MAIN_URL" "$cmd_main") || {
              echo "$LOG_PREFIX [$system_key] Falha na obtenção da URL principal. Mantendo dados anteriores."
            }
            
            url_legacy=$(smart_fetch "${name}_LEGACY_URL" "$cmd_legacy") || {
              echo "$LOG_PREFIX [$system_key] Falha na obtenção da URL legacy. Mantendo dados anteriores."
            }
            
            atomic_backup
            
            if [ -n "$url_main" ]; then
              url_main=$(normalize_url "$url_main" "$system_key")
              hash_main=$(eval "$hash_transform" "$url_main")
            fi
            
            if [ -n "$url_legacy" ]; then
              url_legacy=$(normalize_url "$url_legacy" "$system_key")
              hash_legacy=$(eval "$hash_transform" "$url_legacy")
            fi
            
            if jq --arg sys "$system_key" \
                  --arg url_main "$url_main" \
                  --arg hash_main "$hash_main" \
                  --arg url_legacy "$url_legacy" \
                  --arg hash_legacy "$hash_legacy" \
              '.[$sys] = {
                "url": $url_main,
                "hash": $hash_main,
                "legacy": {
                  "url": $url_legacy,
                  "hash": $hash_legacy
                }
              }' "$FILE" > "${FILE}.tmp"; then
                mv "${FILE}.tmp" "$FILE"
                echo "$LOG_PREFIX [$system_key] SUCESSO: Dados dual persistidos."
                rm -f "${FILE}.backup"
            else
                echo "$LOG_PREFIX [$system_key] ERRO: Falha no JQ. Mantendo dados anteriores."
                atomic_restore
            fi
            
            return 0
          }

          # 10. FUNÇÕES DE HASH TRANSFORM
          mint_hash() { echo "$1" | sed 's|linuxmint-.*.iso|sha256sum.txt|'; }
          suffix_hash() { echo "${1}.sha256"; }

          # --- EXECUÇÃO PRINCIPAL (CONTINUA MESMO COM FALHAS PARCIAIS) ---
          echo "$LOG_PREFIX Iniciando processo de auditoria de mirrors..."
          ensure_infrastructure

          fetch_linuxmint
          fetch_batocera
          fetch_libreelec_dual

          echo "$LOG_PREFIX Processo finalizado. Falhas individuais não interromperam a execução."
          echo "$LOG_PREFIX Estado final do JSON:"
          cat "$FILE"

      - name: Git Deploy (Atomic Commit)
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "Workflow Bot"

          # Busca alterações do remoto para evitar conflitos
          git pull --rebase origin ${GITHUB_REF#refs/heads/} || true

          git add API_JSON/urls.json

          # Verifica se há alterações locais após o pull
          if git diff --cached --quiet; then
            echo "LOG: Nenhuma alteração detectada no JSON. Encerrando sem commit."
          else
            git commit -m "Automated Update: URLs and Hashes [$(date +'%Y-%m-%d %H:%M')]"
            git push origin ${GITHUB_REF#refs/heads/}
          fi
